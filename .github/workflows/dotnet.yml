name: CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  # Lockstep version: every package in this repo (StbImageSharp port + the
  # SharpAstro.Tiff / .Png / .Exif / .Color.Icc / .Jpeg family) ships at the
  # same Major.Minor and a shared run-number patch. Bumped from 2.30 -> 3.0
  # with the SharpAstro.Tiff IccProfile API break (byte[]? -> ReadOnlyMemory<byte>).
  VERSION_PREFIX: 3.0.${{ github.run_number }}
  VERSION_REV: ${{ github.run_attempt }}
  VERSION_HASH: +${{ github.sha }}
  BUILD_CONF: Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore StbImageSharp.JustTests.sln
    - name: Build
      run: dotnet build StbImageSharp.JustTests.sln -c $BUILD_CONF --no-restore -p:Version=${VERSION_PREFIX}${VERSION_REV}${VERSION_HASH} -p:FileVersion=${VERSION_PREFIX}.${VERSION_REV} -p:ContinuousIntegrationBuild=true
    - name: Test
      run: dotnet test StbImageSharp.JustTests.sln -c $BUILD_CONF --no-build
    - name: Upload NuGet package
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: '**/*.nupkg'
        retention-days: 5

  publish-nuget:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
    - name: Download NuGet packages
      uses: actions/download-artifact@v4
      with:
        name: nuget-packages
    - name: Push NuGet package
      run: dotnet nuget push **/*.nupkg -s nuget.org -k ${{ secrets.NUGET_API_KEY }}
