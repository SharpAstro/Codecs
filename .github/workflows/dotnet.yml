name: CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  # Lockstep version: every package in this repo (the SharpAstro.Codecs facade +
  # SharpAstro.Tiff / .Png / .Exif / .Color.Icc / .Jpeg / .Jxr / .Exr / .Jxl family)
  # ships at the same Major.Minor and a shared run-number patch. Bumped from
  # 2.30 -> 3.0 with the SharpAstro.Tiff IccProfile API break (byte[]? ->
  # ReadOnlyMemory<byte>). Bumped 3.0 -> 3.1 with the SharpAstro.Png CicpChunk
  # H.273-enum break (positional args switched from raw bytes to H.273 enums) +
  # Color.Icc IccProfiles.WithCicp helper. Bumped 3.1 -> 3.2 with the new
  # SharpAstro.Exr (OpenEXR read+write) package joining the family. Bumped
  # 3.2 -> 3.3 with the new SharpAstro.Jxl (clean-room JPEG XL: lossless Modular
  # + lossy VarDCT) package joining the family. This env var is the single source
  # of truth for the family Major.Minor -- the -p:Version override below makes
  # per-csproj VersionPrefix decorative for CI publishing. Bumped 3.4 -> 3.5 with
  # ColorEncoding/ToFloats + the TIFF/JXR/EXR/JXL facade adapters (that work first
  # shipped as 3.4.49 because only the csprojs were bumped, not this variable) and
  # the SharpAstro.Jpeg.GainMap (Ultra HDR gain-map read/write) package joining
  # the family. When bumping the family Major.Minor, bump it HERE (and keep
  # Directory.Build.props in sync for local builds).
  VERSION_PREFIX: 3.5.${{ github.run_number }}
  VERSION_REV: ${{ github.run_attempt }}
  VERSION_HASH: +${{ github.sha }}
  BUILD_CONF: Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore Codecs.JustTests.sln
    - name: Build
      run: dotnet build Codecs.JustTests.sln -c $BUILD_CONF --no-restore -p:Version=${VERSION_PREFIX}${VERSION_REV}${VERSION_HASH} -p:FileVersion=${VERSION_PREFIX}.${VERSION_REV} -p:ContinuousIntegrationBuild=true
    - name: Test
      run: dotnet test Codecs.JustTests.sln -c $BUILD_CONF --no-build
    - name: Upload NuGet package
      uses: actions/upload-artifact@v7
      with:
        name: nuget-packages
        path: '**/*.nupkg'
        retention-days: 5

  publish-nuget:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
    - name: Download NuGet packages
      uses: actions/download-artifact@v8
      with:
        name: nuget-packages
    - name: Push NuGet package
      run: dotnet nuget push **/*.nupkg -s nuget.org -k ${{ secrets.NUGET_API_KEY }}
